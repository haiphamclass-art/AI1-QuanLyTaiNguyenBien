version: "3.8"

services:
  postgres_db:
    image: postgres:17
    container_name: postgres_db
    user: postgres
    restart: always
    networks:
      - proxy_network
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=ocean
    volumes:
      - postgres_db:/var/lib/postgresql/data
      - ./backup.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ocean"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  express_backend:
    build: ./backend-express
    container_name: express_backend
    networks:
      - proxy_network
    restart: always
    ports:
      - "5000:5000"
    environment:
      - APP_ENV=production
      - NODE_ENV=production
      - PORT=5000
      - BACKEND_URL=https://quanlytainguyen.tbu.edu.vn/quanlytainguyen/api/express
      - FRONTEND_URL=https://quanlytainguyen.tbu.edu.vn
      - GOOGLE_REDIRECT_URI=https://quanlytainguyen.tbu.edu.vn/quanlytainguyen/api/express/google/callback
      - SWAGGER_MODE=admin
      - CORS_ALLOWED_ORIGINS=https://quanlytainguyen.tbu.edu.vn
      - DB_HOST=postgres_db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=admin
      - DB_NAME=ocean
      - FLASK_API_URL=http://flask_backend:5001
      - FLASK_BASE_URL=http://flask_backend:5001
    depends_on:
      postgres_db:
        condition: service_healthy

  flask_backend:
    build: ./backend-flask
    container_name: flask_backend
    networks:
      - proxy_network
    restart: always
    ports:
      - "5001:5001"
    environment:
      - STATION_FORECAST_ENABLED=false
  frontend:
    build:
      context: ./frontend
      args:
        VITE_BUILD_MODE: production
    container_name: frontend
    networks:
      - proxy_network
    ports:
      - "8082:80"
    restart: always
    depends_on:
      - express_backend

networks:
  proxy_network:
    driver: bridge

volumes:
  postgres_db:
